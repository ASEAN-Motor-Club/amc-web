name: 🔍 CI / 🚀 CD
permissions:
  contents: read
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PUBLIC_API_BASE: ${{ vars.PUBLIC_API_BASE }}
  PUBLIC_DISCORD_LINK: ${{ vars.PUBLIC_DISCORD_LINK }}
  PUBLIC_DISCORD_EVENT_BASE: ${{ vars.PUBLIC_DISCORD_EVENT_BASE }}
  PUBLIC_SEASON_NO: ${{ vars.PUBLIC_SEASON_NO }}
  PUBLIC_SEASON_START_DATE: ${{ vars.PUBLIC_SEASON_START_DATE }}
  PUBLIC_PATREON_LINK: ${{ vars.PUBLIC_PATREON_LINK }}

jobs:
  setup:
    name: 🔧 Setup
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: 🗂️ Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: wasm/pakop

      - name: 📦 Install wasm-pack
        run: cargo install wasm-pack

      - name: 🔨 Build WASM
        run: wasm-pack build wasm/pakop --target bundler

      - name: 📤 Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: wasm/pakop/pkg

  check:
    name: 🔍 Check
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🗃️ Install pnpm
        uses: pnpm/action-setup@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: 📥 Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: wasm/pakop/pkg

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🌐 Generate i18n
        run: pnpm paraglide:compile

      - name: 🎨 Lint code
        run: pnpm lint

      - name: 🔍 Type check
        run: pnpm check

      - name: 🧪 Run tests
        run: pnpm test

  deploy:
    name: 🚀 Deploy
    needs: check
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🗃️ Install pnpm
        uses: pnpm/action-setup@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: 📥 Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: wasm/pakop/pkg

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🏗️ Build application
        run: pnpm build

      - name: 🚀 Deploy
        uses: burnett01/rsync-deployments@7.1.0
        with:
          switches: -avzr --delete
          path: './build/'
          remote_path: '/'
          remote_user: 'sftpuser'
          remote_host: '${{ secrets.SERVER_IP }}'
          remote_key: ${{ secrets.SFTP_KEY }}
