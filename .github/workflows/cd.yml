name: 🔍 CI + 🚀 CD
permissions:
  contents: read
on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PUBLIC_API_BASE: ${{ vars.PUBLIC_API_BASE }}
  PUBLIC_DISCORD_LINK: ${{ vars.PUBLIC_DISCORD_LINK }}
  PUBLIC_DISCORD_EVENT_BASE: ${{ vars.PUBLIC_DISCORD_EVENT_BASE }}
  PUBLIC_SEASON_NO: ${{ vars.PUBLIC_SEASON_NO }}
  PUBLIC_SEASON_START_DATE: ${{ vars.PUBLIC_SEASON_START_DATE }}
  PUBLIC_PATREON_LINK: ${{ vars.PUBLIC_PATREON_LINK }}
  PUBLIC_HOUSE_PRICE_MULTIPLIER: ${{ vars.PUBLIC_HOUSE_PRICE_MULTIPLIER }}

jobs:
  wasm:
    uses: ./.github/workflows/wasm.yml

  check:
    uses: ./.github/workflows/check.yml
    needs: wasm

  build:
    name: 🏗️ Build
    needs: wasm
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🗃️ Install pnpm
        uses: pnpm/action-setup@v5

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: 📥 Download pakop artifact
        uses: actions/download-artifact@v8
        with:
          name: wasm-pkg
          path: wasm/pakop/pkg

      - name: 📥 Download wasm-map artifact
        uses: actions/download-artifact@v8
        with:
          name: wasm-map-pkg
          path: wasm/wasm-map/pkg

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🔌 Generate protobuf types
        run: pnpm proto:generate

      - name: 🏗️ Build application
        run: pnpm build

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: build/

  deploy:
    name: 🚀 Deploy
    needs: [check, build]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: build
          path: build/

      - name: 🚀 Deploy
        uses: burnett01/rsync-deployments@v8
        with:
          switches: -avzr --delete
          path: './build/'
          remote_path: '/'
          remote_user: 'sftpuser'
          remote_host: '${{ secrets.SERVER_IP }}'
          remote_key: ${{ secrets.SFTP_KEY }}
