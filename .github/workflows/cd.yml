name: 🚀 Deploy
permissions:
  contents: read
on:
  workflow_run:
    workflows: ['🔍 Integration check']
    types: [completed]
    branches: [main]
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    env:
      PUBLIC_API_BASE: ${{ vars.PUBLIC_API_BASE }}
      PUBLIC_DISCORD_LINK: ${{ vars.PUBLIC_DISCORD_LINK }}
      PUBLIC_DISCORD_EVENT_BASE: ${{ vars.PUBLIC_DISCORD_EVENT_BASE }}
      PUBLIC_SEASON_NO: ${{ vars.PUBLIC_SEASON_NO }}
      PUBLIC_SEASON_START_DATE: ${{ vars.PUBLIC_SEASON_START_DATE }}
      PUBLIC_PATREON_LINK: ${{ vars.PUBLIC_PATREON_LINK }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🗃️ Install pnpm
        uses: pnpm/action-setup@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: 🗂️ Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: pakop

      - name: 📦 Install wasm-pack
        run: cargo install wasm-pack

      - name: 🔨 Build WASM
        run: pnpm build:pakop

      - name: 📦 Install dependencies
        run: pnpm install -P

      - name: 🏗️ Build application
        run: pnpm build

      - name: 🚀 Deploy
        uses: burnett01/rsync-deployments@7.1.0
        with:
          switches: -avzr --delete
          path: './build/'
          remote_path: '/'
          remote_user: 'sftpuser'
          remote_host: '${{ secrets.SERVER_IP }}'
          remote_key: ${{ secrets.SFTP_KEY }}

      # - name: Run Discord notification script
      #   env:
      #     DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      #   run: python3 scripts/discord_notify.py
